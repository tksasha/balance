require:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec

AllCops:
  Exclude:
    - tmp/**/*
    - db/schema.rb
    - db/migrate/*.rb
    - bin/*
  NewCops: enable
  SuggestExtensions: true

# Layout
Layout/LineLength:
  Max: 120

Layout/SpaceInsideStringInterpolation:
  EnforcedStyle: space

# Lint
Lint/MissingSuper:
  Enabled: false

# Metrics
Metrics/BlockLength:
  Exclude:
  - lib/tasks/auto_annotate_models.rake
  - spec/**/*

# RSpec
RSpec/MessageSpies:
  EnforcedStyle: receive

RSpec/ExpectInHook:
  Enabled: false

RSpec/MissingExampleGroupArgument:
  Enabled: false

RSpec/ScatteredSetup:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/SubjectStub:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/MessageChain:
  Enabled: false

RSpec/FilePath:
  SpecSuffixOnly: true

RSpec/MultipleMemoizedHelpers:
  Exclude:
    - spec/models/frontend/dashboard_spec.rb

# Rails
Rails/SkipsModelValidations:
  AllowedMethods: [touch]

Rails/FilePath:
  EnforcedStyle: arguments

Rails/HasAndBelongsToMany:
  Enabled: false

# Style
Style/Documentation:
  Enabled: false
